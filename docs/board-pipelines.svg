  <!-- Arrow + gate -->
  <line x1="369" y1="276" x2="398" y2="276" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" marker-end="url(#arrowHead)" />
  <text x="383" y="303" font-family="-apple-system, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.32)" text-anchor="middle">draft complete</text>

  <!-- Col 3: review -->
