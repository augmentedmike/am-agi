  <text x="36" y="511" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.2)" letter-spacing="0.2">AM · helloam.bot</text>
  <text x="1064" y="511" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.2)" text-anchor="end" letter-spacing="0.2">board v1</text>

</svg>
