  <!-- Pill badge -->
  <rect x="20" y="342" width="88" height="24" rx="12" fill="url(#pillSupport)" stroke="rgba(239,68,68,0.3)" stroke-width="1" />
  <text x="64" y="358" font-family="-apple-system, system-ui, sans-serif" font-size="10" font-weight="500" fill="rgba(252,165,165,0.9)" text-anchor="middle" letter-spacing="0.3">Support</text>

  <!-- Col 1: open -->
