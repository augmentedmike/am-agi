  <text x="454" y="281" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="0.1">review</text>

  <!-- Arrow + gate -->
  <line x1="509" y1="276" x2="538" y2="276" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" marker-end="url(#arrowHead)" />
  <text x="523" y="303" font-family="-apple-system, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.32)" text-anchor="middle">edits signed off</text>

  <!-- Col 4: published -->
  <rect x="540" y="258" width="108" height="36" rx="8" fill="rgba(245,158,11,0.10)" stroke="rgba(245,158,11,0.28)" stroke-width="1" />
  <text x="594" y="281" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="rgba(253,211,77,0.95)" text-anchor="middle" letter-spacing="0.1">published</text>


