<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111114;stop-opacity:1" />
    </linearGradient>

    <!-- Glass card filter -->
    <filter id="glass" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Subtle glow for active elements -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrowHead" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polyline points="0,1 6,3.5 0,6" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" stroke-linejoin="round" />
    </marker>

    <!-- Arrow marker for branch (rejected/lost) -->
    <marker id="arrowHeadBranch" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polyline points="0,1 6,3.5 0,6" fill="none" stroke="rgba(255,100,100,0.45)" stroke-width="1.2" stroke-linejoin="round" />
    </marker>

    <!-- Pill badge gradient -->
    <linearGradient id="pillSoftware" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(99,102,241,0.25);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(99,102,241,0.10);stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pillSales" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(16,185,129,0.25);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(16,185,129,0.10);stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pillContent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(245,158,11,0.25);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(245,158,11,0.10);stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pillSupport" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(239,68,68,0.25);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(239,68,68,0.10);stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pillHiring" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(168,85,247,0.25);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(168,85,247,0.10);stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="520" fill="url(#bgGrad)" rx="0" />

  <!-- Subtle grid texture -->
  <rect width="1100" height="520" fill="none" stroke="rgba(255,255,255,0.015)" stroke-width="0" />

  <!-- Top border accent line -->
  <line x1="0" y1="0" x2="1100" y2="0" stroke="rgba(255,255,255,0.08)" stroke-width="1" />

  <!-- Header section -->
  <text x="36" y="46" font-family="-apple-system, system-ui, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,1)" letter-spacing="-0.3">AM Board Pipelines</text>
  <text x="36" y="66" font-family="-apple-system, system-ui, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="rgba(255,255,255,0.4)" letter-spacing="0.1">Column gates vary by project type</text>

  <!-- Divider -->
  <line x1="36" y1="82" x2="1064" y2="82" stroke="rgba(255,255,255,0.06)" stroke-width="1" />

  <!-- ===================== ROW 1: SOFTWARE ===================== -->
  <!-- Pill badge -->
  <rect x="20" y="102" width="88" height="24" rx="12" fill="url(#pillSoftware)" stroke="rgba(99,102,241,0.3)" stroke-width="1" />
  <text x="64" y="118" font-family="-apple-system, system-ui, sans-serif" font-size="10" font-weight="500" fill="rgba(165,168,255,0.9)" text-anchor="middle" letter-spacing="0.3">Software</text>

  <!-- Col 1: backlog -->
  <rect x="120" y="98" width="108" height="36" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1" />
  <text x="174" y="121" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="0.1">backlog</text>

  <!-- Arrow + gate -->
  <line x1="229" y1="116" x2="258" y2="116" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" marker-end="url(#arrowHead)" />
  <text x="243" y="143" font-family="-apple-system, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.32)" text-anchor="middle">criteria written</text>

  <!-- Col 2: in-progress -->
  <rect x="260" y="98" width="108" height="36" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1" />
  <text x="314" y="121" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="0.1">in-progress</text>

  <!-- Arrow + gate -->
  <line x1="369" y1="116" x2="398" y2="116" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" marker-end="url(#arrowHead)" />
  <text x="383" y="143" font-family="-apple-system, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.32)" text-anchor="middle">all criteria met</text>

  <!-- Col 3: in-review -->
  <rect x="400" y="98" width="108" height="36" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1" />
  <text x="454" y="121" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="0.1">in-review</text>

  <!-- Arrow + gate -->
  <line x1="509" y1="116" x2="538" y2="116" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" marker-end="url(#arrowHead)" />
  <text x="523" y="143" font-family="-apple-system, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.32)" text-anchor="middle">tests pass</text>

  <!-- Col 4: shipped -->
  <rect x="540" y="98" width="108" height="36" rx="8" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1" />
  <text x="594" y="121" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="rgba(165,168,255,0.95)" text-anchor="middle" letter-spacing="0.1">shipped</text>


  <!-- ===================== ROW 2: SALES OUTBOUND ===================== -->
  <!-- Pill badge -->
  <rect x="20" y="182" width="88" height="24" rx="12" fill="url(#pillSales)" stroke="rgba(16,185,129,0.3)" stroke-width="1" />
  <text x="64" y="198" font-family="-apple-system, system-ui, sans-serif" font-size="10" font-weight="500" fill="rgba(110,231,183,0.9)" text-anchor="middle" letter-spacing="0.3">Sales</text>

  <!-- Col 1: lead -->
  <rect x="120" y="178" width="86" height="36" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1" />
  <text x="163" y="201" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="0.1">lead</text>

  <!-- Arrow + gate -->
  <line x1="207" y1="196" x2="232" y2="196" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" marker-end="url(#arrowHead)" />
  <text x="219" y="223" font-family="-apple-system, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.32)" text-anchor="middle">first touch</text>

  <!-- Col 2: contacted -->
  <rect x="234" y="178" width="86" height="36" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1" />
  <text x="277" y="201" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="0.1">contacted</text>

  <!-- Arrow + gate -->
  <line x1="321" y1="196" x2="346" y2="196" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" marker-end="url(#arrowHead)" />
  <text x="333" y="223" font-family="-apple-system, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.32)" text-anchor="middle">need confirmed</text>

  <!-- Col 3: qualified -->
  <rect x="348" y="178" width="86" height="36" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1" />
  <text x="391" y="201" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="0.1">qualified</text>

  <!-- Arrow + gate -->
  <line x1="435" y1="196" x2="460" y2="196" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" marker-end="url(#arrowHead)" />
  <text x="447" y="223" font-family="-apple-system, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.32)" text-anchor="middle">sent proposal</text>

  <!-- Col 4: proposal -->
  <rect x="462" y="178" width="86" height="36" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1" />
  <text x="505" y="201" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="0.1">proposal</text>

  <!-- Fork arrow up: closed-won -->
  <polyline points="549,196 570,196 570,181" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" marker-end="url(#arrowHead)" />
  <!-- Fork arrow down: closed-lost -->
  <polyline points="549,196 570,196 570,213" fill="none" stroke="rgba(255,100,100,0.4)" stroke-width="1.2" marker-end="url(#arrowHeadBranch)" />

  <!-- Gate label -->
  <text x="559" y="223" font-family="-apple-system, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.32)" text-anchor="middle">decision</text>

  <!-- Col 5a: closed-won -->
  <rect x="572" y="163" width="96" height="30" rx="8" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.3)" stroke-width="1" />
  <text x="620" y="182" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="rgba(110,231,183,0.95)" text-anchor="middle" letter-spacing="0.1">closed-won</text>

  <!-- Col 5b: closed-lost -->
  <rect x="572" y="199" width="96" height="30" rx="8" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.22)" stroke-width="1" />
  <text x="620" y="218" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="rgba(252,165,165,0.7)" text-anchor="middle" letter-spacing="0.1">closed-lost</text>


  <!-- ===================== ROW 3: CONTENT MARKETING ===================== -->
  <!-- Pill badge -->
  <rect x="20" y="262" width="88" height="24" rx="12" fill="url(#pillContent)" stroke="rgba(245,158,11,0.3)" stroke-width="1" />
  <text x="64" y="278" font-family="-apple-system, system-ui, sans-serif" font-size="10" font-weight="500" fill="rgba(253,211,77,0.9)" text-anchor="middle" letter-spacing="0.3">Content</text>

  <!-- Col 1: ideas -->
  <rect x="120" y="258" width="108" height="36" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1" />
  <text x="174" y="281" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="0.1">ideas</text>

  <!-- Arrow + gate -->
  <line x1="229" y1="276" x2="258" y2="276" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" marker-end="url(#arrowHead)" />
  <text x="243" y="303" font-family="-apple-system, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.32)" text-anchor="middle">brief approved</text>

  <!-- Col 2: drafting -->
  <rect x="260" y="258" width="108" height="36" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1" />
